# Warning: Do not unify this file with others. Keep tool definitions localized.
[tasks.lint]
description = "Run all linters"
run = "workspaced codebase lint"

[tasks.fmt]
description = "Format all files"
run = "workspaced codebase format"

[tasks.ci]
description = "Run CI pipeline locally"
depends = ["lint", "test"]

[tasks.test]
depends = ["test:*"]

[tasks.codegen]
depends = ["codegen:*"]

[tasks.install]
depends = ["install:*"]

[tools]
# "github:lucasew/workspaced" = "0.2.1"
sops = "3.11.0"

[tasks."install:tools"]
run = "mise install"

[tasks."codegen:dummy"]
run = "echo ok"

[tasks."test:dummy"]
run = "echo ok"
