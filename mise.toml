# Warning: Do not unify this file with others. Keep tool definitions localized.
[tasks.lint]
description = "Run all linters"
run = "workspaced codebase lint"

[tasks.fmt]
description = "Format all files"
run = "workspaced codebase format"

[tasks.ci]
description = "Run CI pipeline locally"
depends = ["lint", "test"]

[tasks.install]
depends = ["install:*"]

[tasks."install:tools"]
description = "Install tools recursively"
run = """
mise install
mise install -C infra
"""

[tasks.test]
depends = ["test:*"]

[tasks."test:nix"]
description = "Test Nix configuration"
run = "command -v nix >/dev/null && nix --accept-flake-config --extra-experimental-features 'nix-command flakes impure-derivations ca-derivations' flake check --impure || echo 'Nix not found, skipping'"

[tasks.codegen]
depends = ["codegen:*"]

[tools]
# "github:lucasew/workspaced" = "0.2.1"
sops = "3.11.0"
